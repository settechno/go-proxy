name: release.yml

on:
  push:
    tags:
      - 'v*'

jobs:
  create-executions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Golang
        uses: actions/setup-go@v5 # Sets up the Go environment
        with:
          go-version: '1.24'

      - name: Build Server
        run: GOOS=linux GOARCH=amd64 go build -ldflags="-w -s" -buildvcs=false -o bin/server ./cmd/server

      - name: Build Create User Command
        run: GOOS=linux GOARCH=amd64 go build -ldflags="-w -s" -buildvcs=false -o bin/create-user ./cmd/create-user

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            bin/server
            bin/create-user
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}